###############
### WINDOWS ###
###############

# Colors
$primary = rgba(88d1ecff)
$on_surface = rgba(dee3e6ff)

general {
    gaps_in = 1
    gaps_out = 0
    border_size = 2
    col.active_border = $on_surface
    col.inactive_border = $primary
    layout = dwindle
    resize_on_border = false
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:fullscreen = false
    match:float = true
    match:pin = false
    no_focus = true
}
